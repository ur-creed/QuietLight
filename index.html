<!doctype html>
<html>
  <head>
    <title>Quiet Light</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #FAFAF7;
        color: #1A1A1A;
        line-height: 1.6;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 20px;
      }
      .wrapper {
        max-width: 480px;
        text-align: center;
      }
      .app-icon {
        width: 80px;
        height: 80px;
        border-radius: 18px;
        margin: 0 auto 24px;
        object-fit: cover;
      }
      h1 {
        font-size: 28px;
        font-weight: 400;
        letter-spacing: -0.3px;
        color: #1A1A1A;
        line-height: 1.3;
      }
      .subtitle {
        font-size: 17px;
        color: #8A8A8A;
        margin-top: 8px;
        line-height: 1.6;
      }
      .divider {
        width: 40px;
        height: 1px;
        background: #E8E8E5;
        margin: 32px auto;
      }
      .steps-container {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .step {
        padding: 24px;
        border: 1px solid #E8E8E5;
        border-radius: 16px;
        background: #FFFFFF;
        text-align: center;
      }
      .step-header {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 10px;
      }
      .step-number {
        width: 26px;
        height: 26px;
        border: 1px solid #D4D4D0;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 400;
        font-size: 13px;
        color: #8A8A8A;
        flex-shrink: 0;
      }
      .step-title {
        font-size: 17px;
        font-weight: 600;
        color: #1A1A1A;
      }
      .step-description {
        font-size: 14px;
        color: #8A8A8A;
        margin-bottom: 16px;
        line-height: 1.5;
      }
      .store-buttons {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .store-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px 20px;
        font-size: 14px;
        font-weight: 500;
        border: 1px solid #E8E8E5;
        border-radius: 12px;
        text-decoration: none;
        color: #1A1A1A;
        background: #F5F5F0;
        transition: all 0.2s;
      }
      .store-button:hover {
        background: #E8E8E5;
        border-color: #D4D4D0;
      }
      .store-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 8px 0;
        font-size: 13px;
        font-weight: 400;
        text-decoration: underline;
        text-underline-offset: 2px;
        color: #8A8A8A;
        background: none;
        border: none;
        transition: color 0.2s;
      }
      .store-link:hover {
        color: #1A1A1A;
      }
      .store-link .store-icon {
        width: 14px;
        height: 14px;
      }
      .store-icon {
        width: 18px;
        height: 18px;
      }
      .qr-section {
        background: #1A1A1A;
        border-color: #1A1A1A;
        color: #E8E4E0;
      }
      .qr-section .step-number {
        border-color: rgba(232, 228, 224, 0.3);
        color: #E8E4E0;
      }
      .qr-section .step-title {
        color: #E8E4E0;
      }
      .qr-section .step-description {
        color: rgba(232, 228, 224, 0.6);
      }
      .qr-code {
        width: 180px;
        height: 180px;
        margin: 0 auto 16px;
        background: #fff;
        border-radius: 12px;
        padding: 12px;
      }
      .qr-code canvas {
        width: 100%;
        height: 100%;
      }
      .open-button {
        display: inline-block;
        padding: 12px 24px;
        font-size: 14px;
        font-weight: 500;
        border: 1px solid rgba(232, 228, 224, 0.2);
        border-radius: 12px;
        text-decoration: none;
        color: #1A1A1A;
        background: #FAFAF7;
        transition: opacity 0.2s;
      }
      .open-button:hover {
        opacity: 0.85;
      }
      .loading {
        display: none;
        margin: 60px 0;
      }
      .spinner {
        border: 2px solid #E8E8E5;
        border-top-color: #1A1A1A;
        border-radius: 50%;
        width: 32px;
        height: 32px;
        animation: spin 0.8s linear infinite;
        margin: 20px auto;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loading-text {
        font-size: 16px;
        color: #8A8A8A;
      }
      .content {
        display: block;
      }
      footer {
        padding: 24px 20px;
        text-align: center;
        border-top: 1px solid #E8E8E5;
      }
      .footer-links {
        display: flex;
        justify-content: center;
        gap: 24px;
      }
      .footer-links a {
        font-size: 13px;
        color: #8A8A8A;
        text-decoration: none;
        transition: color 0.2s;
      }
      .footer-links a:hover {
        color: #1A1A1A;
      }

      @media (min-width: 768px) {
        main {
          padding: 64px 32px;
        }
        .wrapper {
          max-width: 720px;
        }
        h1 {
          font-size: 34px;
        }
        .subtitle {
          margin-bottom: 8px;
        }
        .steps-container {
          flex-direction: row;
          gap: 20px;
          align-items: stretch;
        }
        .step {
          flex: 1;
          display: flex;
          flex-direction: column;
          padding: 28px;
        }
        .step-description {
          flex-grow: 1;
        }
        .store-buttons {
          gap: 10px;
        }
        .qr-code {
          width: 200px;
          height: 200px;
        }
      }

      @media (min-width: 1024px) {
        .wrapper {
          max-width: 800px;
        }
        h1 {
          font-size: 36px;
        }
        .steps-container {
          gap: 28px;
        }
        .step {
          padding: 32px;
        }
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #1C1A18;
          color: #E8E4E0;
        }
        h1 {
          color: #E8E4E0;
        }
        .subtitle {
          color: #9A9490;
        }
        .divider {
          background: #3A3835;
        }
        .spinner {
          border-color: #3A3835;
          border-top-color: #E8E4E0;
        }
        .loading-text {
          color: #9A9490;
        }
        .step {
          border-color: #3A3835;
          background: #252320;
        }
        .step-number {
          border-color: #3D3B38;
          color: #9A9490;
        }
        .step-title {
          color: #E8E4E0;
        }
        .step-description {
          color: #9A9490;
        }
        .store-button {
          border-color: #3A3835;
          color: #E8E4E0;
          background: #2D2B28;
        }
        .store-button:hover {
          background: #3A3835;
          border-color: #3D3B38;
        }
        .store-link {
          color: #9A9490;
        }
        .store-link:hover {
          color: #E8E4E0;
        }
        .qr-section {
          background: #252320;
          border-color: #3A3835;
        }
        .qr-section .step-number {
          border-color: rgba(232, 228, 224, 0.3);
        }
        .qr-section .step-description {
          color: rgba(232, 228, 224, 0.5);
        }
        .open-button {
          background: #E8E4E0;
          color: #1C1A18;
        }
        .open-button:hover {
          background: #D4D4D0;
        }
        footer {
          border-top-color: #3A3835;
        }
        .footer-links a {
          color: #9A9490;
        }
        .footer-links a:hover {
          color: #E8E4E0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="wrapper">
        <div class="loading" id="loading">
          <div class="spinner"></div>
          <div class="loading-text">Opening in Expo Go...</div>
        </div>

        <div class="content" id="content">
          <img src="assets/images/icon.png" alt="Quiet Light" class="app-icon" />
          <h1>Quiet Light</h1>
          <p class="subtitle">Preview this app on your phone</p>
          <div class="divider"></div>

          <div class="steps-container">
            <div class="step">
              <div class="step-header">
                <div class="step-number">1</div>
                <h2 class="step-title">Download Expo Go</h2>
              </div>
              <p class="step-description">
                Expo Go is a free app to test mobile apps
              </p>
              <div class="store-buttons" id="store-buttons">
                <a
                  id="app-store-btn"
                  href="https://apps.apple.com/app/id982107779"
                  class="store-button"
                  target="_blank"
                >
                  <svg class="store-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z" />
                  </svg>
                  App Store
                </a>
                <a
                  id="play-store-btn"
                  href="https://play.google.com/store/apps/details?id=host.exp.exponent"
                  class="store-button"
                  target="_blank"
                >
                  <svg class="store-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.6 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.53,12.9 20.18,13.18L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z" />
                  </svg>
                  Google Play
                </a>
              </div>
            </div>

            <!-- <div class="step qr-section">
              <div class="step-header">
                <div class="step-number">2</div>
                <h2 class="step-title">Scan QR Code</h2>
              </div>
              <p class="step-description">Use your phone's camera or Expo Go</p>
              <div class="qr-code" id="qr-code"></div>
              <a href="exps://EXPS_URL_PLACEHOLDER" class="open-button">Open in Expo Go</a>
            </div> -->
          </div>
        </div>
      </div>
    </main>

    <footer>
      <div class="footer-links">
        <a href="/privacy">Privacy Policy</a>
        <a href="/terms">Terms of Service</a>
      </div>
    </footer>
  </body>
</html>

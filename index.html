<!doctype html>
<html>
  <head>
    <title>Quiet Light</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
  --text: #1A1A1A;
  --text-secondary: #8A8A8A;
  --button-text: #FFFFFF;
  --link: #1A1A1A;
  --background-root: #FAFAF7;
  --background-default: #FFFFFF;
  --background-secondary: #F5F5F0;
  --background-tertiary: #EBEBEB;
  --accent: #D4D4D0;
  --border: #E8E8E5;

  --spacing-xl: 32px;
  --spacing-lg: 24px;
  --spacing-md: 16px;
  --spacing-sm: 12px;
  --spacing-xs: 8px;
  --spacing-3xl: 48px;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--background-root);
  color: var(--text);
  line-height: 1.6;
}

.container {
  min-height: 100vh;
  padding: var(--spacing-xl) var(--spacing-xl) var(--spacing-3xl);
  max-width: 800px;
  margin: 0 auto;
  box-sizing: border-box;
  background: var(--background-default);
}

.title {
  font-size: 2.2rem;
  font-weight: 600;
  margin-bottom: var(--spacing-xs);
  color: var(--text);
}

.effective-date,
.last-updated {
  font-size: 0.9rem;
  color: var(--text-secondary);
  margin-bottom: var(--spacing-xl);
  opacity: 0.85;
}

.intro,
.body {
  font-size: 1.05rem;
  color: var(--text-secondary);
  margin-bottom: var(--spacing-xl);
  line-height: 1.65;
}

.section-title {
  font-size: 1.35rem;
  font-weight: 600;
  margin: var(--spacing-md) 0 var(--spacing-sm);
  color: var(--text);
}

.subheading {
  font-size: 1.15rem;
  font-weight: 500;
  margin: var(--spacing-sm) 0 var(--spacing-xs);
  color: var(--text);
}

.bullet-list {
  margin-left: var(--spacing-md);
  margin-bottom: var(--spacing-md);
}

.bullet-item {
  font-size: 1rem;
  color: var(--text-secondary);
  margin-bottom: var(--spacing-xs);
  padding-left: var(--spacing-sm);
  position: relative;
}

.bullet-item::before {
  content: "•";
  position: absolute;
  left: -1.2em;
  color: var(--text);
  font-weight: bold;
}

a {
  color: var(--link);
  text-decoration: underline;
}

a:hover {
  color: var(--text);
}

@media (max-width: 600px) {
  .container {
    padding: var(--spacing-lg) var(--spacing-lg) var(--spacing-3xl);
  }
  .title {
    font-size: 1.9rem;
  }
}
    </style>
  </head>
  <body>
    <main>
      <div class="wrapper">
        <div class="loading" id="loading">
          <div class="spinner"></div>
          <div class="loading-text">Opening in Expo Go...</div>
        </div>

        <div class="content" id="content">
          <img src="assets/images/icon.png" alt="Quiet Light" class="app-icon" />
          <h1>Quiet Light</h1>
          <p class="subtitle">Preview this app on your phone</p>
          <div class="divider"></div>

          <div class="steps-container">
            <div class="step">
              <div class="step-header">
                <div class="step-number">1</div>
                <h2 class="step-title">Download Expo Go</h2>
              </div>
              <p class="step-description">
                Expo Go is a free app to test mobile apps
              </p>
              <div class="store-buttons" id="store-buttons">
                <a
                  id="app-store-btn"
                  href="https://apps.apple.com/app/id982107779"
                  class="store-button"
                  target="_blank"
                >
                  <svg class="store-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z" />
                  </svg>
                  App Store
                </a>
                <a
                  id="play-store-btn"
                  href="https://play.google.com/store/apps/details?id=host.exp.exponent"
                  class="store-button"
                  target="_blank"
                >
                  <svg class="store-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.6 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.53,12.9 20.18,13.18L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z" />
                  </svg>
                  Google Play
                </a>
              </div>
            </div>

            <!-- <div class="step qr-section">
              <div class="step-header">
                <div class="step-number">2</div>
                <h2 class="step-title">Scan QR Code</h2>
              </div>
              <p class="step-description">Use your phone's camera or Expo Go</p>
              <div class="qr-code" id="qr-code"></div>
              <a href="exps://EXPS_URL_PLACEHOLDER" class="open-button">Open in Expo Go</a>
            </div> -->
          </div>
        </div>
      </div>
    </main>

    <footer>
      <div class="footer-links">
        <a href="/privacy.html">Privacy Policy</a>
        <a href="/terms.html">Terms of Service</a>
      </div>
    </footer>
  </body>
</html>
